services:
  database:
    image: postgres:16-alpine
    container_name: crisisdesk-database

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: crisisdesk_dev_password
      POSTGRES_DB: crisisdesk_ai

    ports:
      - "5433:5432"

    volumes:
      - crisisdesk_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d crisisdesk_ai" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: crisisdesk-api

    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 5000

      DATABASE_URL: postgresql://postgres:crisisdesk_dev_password@database:5432/crisisdesk_ai?schema=public
      DIRECT_URL: postgresql://postgres:crisisdesk_dev_password@database:5432/crisisdesk_ai?schema=public

      CORS_ORIGINS: http://localhost:3000,http://localhost:5173

    ports:
      - "5000:5000"

    depends_on:
      database:
        condition: service_healthy

volumes:
  crisisdesk_postgres_data:
